services:
  db:
    image: postgis/postgis:16-3.4
    container_name: betbingo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: betbingo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-betbingo}
      POSTGRES_DB: betbingo
    ports:
      # Host 5434 → container 5432 (parking project uses 5433)
      - "5434:5432"
    volumes:
      - betbingo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betbingo -d betbingo"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - betbingo-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: betbingo-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgres://betbingo:${DB_PASSWORD:-betbingo}@db:5432/betbingo
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - betbingo-net

volumes:
  betbingo_pgdata:

networks:
  betbingo-net:
    driver: bridge
