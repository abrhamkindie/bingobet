<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>ParkAddis — Scan QR</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      body {
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .scan-container {
        text-align: center;
        max-width: 340px;
        width: 100%;
      }
      .scan-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .scan-icon svg {
        width: 40px;
        height: 40px;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 12px;
      }
      p {
        font-size: 15px;
        color: rgba(255,255,255,0.7);
        line-height: 1.5;
        margin: 0 0 28px;
      }
      .scan-btn {
        background: #4F46E5;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 16px 32px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        width: 100%;
      }
      .scan-btn:hover {
        background: #4338CA;
      }
      .scan-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .manual-input {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      .manual-input label {
        display: block;
        font-size: 14px;
        color: rgba(255,255,255,0.6);
        margin-bottom: 8px;
      }
      .manual-input input {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 10px;
        padding: 12px 16px;
        color: #fff;
        font-size: 16px;
        width: 100%;
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      .manual-input input:focus {
        border-color: #4F46E5;
      }
      .manual-input input::placeholder {
        color: rgba(255,255,255,0.3);
      }
      .hidden { display: none; }
      .result {
        margin-top: 16px;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
      }
      .result.success { background: rgba(34,197,94,0.15); color: #22c55e; }
      .result.error { background: rgba(239,68,68,0.15); color: #ef4444; }
      /* Camera scanner area */
      #reader {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        margin-top: 16px;
        background: #000;
      }
      #reader video {
        border-radius: 12px;
      }
      .stop-btn {
        background: rgba(239,68,68,0.2);
        color: #ef4444;
        border: 1px solid rgba(239,68,68,0.3);
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 12px;
        width: 100%;
      }
      .stop-btn:hover {
        background: rgba(239,68,68,0.3);
      }
    </style>
  </head>
  <body>
    <div class="scan-container">
      <div class="scan-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <line x1="7" y1="12" x2="17" y2="12"/>
        </svg>
      </div>
      <h1>Scan Driver's QR Code</h1>
      <p>
        Ask the driver to show their QR code, then tap the button below to scan it.
      </p>

      <button class="scan-btn" id="scanBtn">📷 Open QR Scanner</button>

      <div id="reader" class="hidden"></div>
      <button class="stop-btn hidden" id="stopBtn">✕ Close Scanner</button>

      <div class="manual-input">
        <label>Or type the booking code manually</label>
        <input type="text" id="manualCode" placeholder="e.g. PK-ABC12" maxlength="10" />
      </div>

      <div id="result" class="result hidden"></div>
    </div>

    <script>
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) { tg.ready(); tg.expand(); }

      var scanBtn = document.getElementById('scanBtn');
      var stopBtn = document.getElementById('stopBtn');
      var manualInput = document.getElementById('manualCode');
      var resultEl = document.getElementById('result');
      var readerEl = document.getElementById('reader');

      var processed = false;
      var html5QrCode = null;

      function showResult(text, type) {
        resultEl.textContent = text;
        resultEl.className = 'result ' + type;
        resultEl.classList.remove('hidden');
      }

      function hideResult() {
        resultEl.classList.add('hidden');
      }

      function resetScanBtn() {
        scanBtn.disabled = false;
        scanBtn.textContent = ' Open QR Scanner';
      }

      function sendToBot(data) {
        if (tg && typeof tg.sendData === 'function') {
          tg.sendData(JSON.stringify(data));
          // sendData auto-closes the Mini App
        } else {
          showResult(
            'Could not send to bot. Please go back to Telegram and type the code manually.',
            'error'
          );
        }
      }

      // Process a scanned QR code string
      function handleScannedText(scannedText) {
        if (processed) return;

        // Extract the check-in token from the t.me deep link
        var match = scannedText.match(/start=checkin_([A-Za-z0-9_-]+)/);
        var token = match ? match[1] : null;

        if (token) {
          processed = true;
          stopScanner();
          showResult('✓ QR scanned! Processing check-in...', 'success');
          sendToBot({ type: 'checkin', token: token });
        } else {
          showResult('Invalid QR. Please scan the driver\'s booking QR code.', 'error');
        }
      }

      // Stop the html5-qrcode scanner
      function stopScanner() {
        if (html5QrCode) {
          html5QrCode.stop().then(function() {
            html5QrCode.clear();
          }).catch(function(err) {
            console.warn('Scanner stop error:', err);
          });
          html5QrCode = null;
        }
        readerEl.classList.add('hidden');
        stopBtn.classList.add('hidden');
        scanBtn.classList.remove('hidden');
        resetScanBtn();
      }

      // Start the browser-based camera scanner
      function startCameraScanner() {
        hideResult();
        processed = false;
        scanBtn.classList.add('hidden');
        readerEl.classList.remove('hidden');
        stopBtn.classList.remove('hidden');

        html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
          { facingMode: "environment" }, // rear camera
          {
            fps: 10,
            qrbox: { width: 250, height: 250 },
          },
          function(decodedText) {
            handleScannedText(decodedText);
          },
          function(errorMessage) {
            // QR parse error — ignore, keep scanning
          }
        ).catch(function(err) {
          showResult(
            'Camera access denied. Please allow camera permissions or type the code manually.',
            'error'
          );
          stopScanner();
        });
      }

      // Try Telegram's native scanner first, fall back to camera
      scanBtn.addEventListener('click', function() {
        var scanQr = tg && (tg.showScanQrPopup || tg.openScanQrPopup);
        if (typeof scanQr === 'function') {
          // Telegram native scanner
          processed = false;
          scanBtn.disabled = true;
          scanBtn.textContent = 'Scanning...';

          scanQr.call(tg, {}, function(scannedText) {
            if (processed) return 'continue';

            if (!scannedText || scannedText === 'cancelled') {
              resetScanBtn();
              return;
            }

            handleScannedText(scannedText);
            if (processed) return 'continue';

            // Invalid QR
            resetScanBtn();
            return;
          });
        } else {
          // Fallback: browser camera scanner
          startCameraScanner();
        }
      });

      // Stop scanner button
      stopBtn.addEventListener('click', function() {
        stopScanner();
      });

      // Manual code entry via Enter key
      manualInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          var code = manualInput.value.trim().toUpperCase();
          if (!code) return;
          sendToBot({ type: 'checkin_code', code: code });
          showResult('✓ Code sent! Processing...', 'success');
        }
      });
    </script>
  </body>
</html>
